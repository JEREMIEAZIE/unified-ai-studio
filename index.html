<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified AI Studio - Chat, Image & Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-text { font-size: 20px; font-weight: 700; }

        .nav-section { margin-bottom: 24px; }
        .nav-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding-left: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            font-weight: 500;
        }

        .recent-chats { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }
        .chat-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .chat-item.active { background: rgba(99, 102, 241, 0.2); color: var(--primary); }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title { font-size: 18px; font-weight: 600; }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--border-color); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-lg); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
        }

        /* Chat Interface */
        .chat-container { max-width: 900px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; }
        
        .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        
        .message-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .message.user .message-avatar { background: var(--primary); color: white; }
        .message.assistant .message-avatar { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        
        .message-content {
            padding: 14px 18px; border-radius: 16px; line-height: 1.6; font-size: 15px;
        }
        .message.user .message-content { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .message.assistant .message-content { background: var(--bg-secondary); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
        .message-content pre { background: #1e293b; color: #f8fafc; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-size: 13px; }
        .message-content img, .message-content video { max-width: 100%; border-radius: 8px; margin: 8px 0; }

        .input-area {
            padding: 24px 32px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper { max-width: 900px; margin: 0 auto; }
        
        .input-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 8px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mode-btn.active { background: var(--primary); color: white; }
        .mode-btn:hover:not(.active) { color: var(--text-primary); }

        .chat-input-container {
            position: relative;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 16px 50px 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            transition: all 0.2s;
            background: var(--bg-primary);
            min-height: 60px;
            max-height: 200px;
        }

        .chat-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover { background: var(--primary-hover); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .attachment-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .attachment-btn:hover { background: var(--border-color); color: var(--text-primary); }

        .file-preview {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .file-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
        }

        .file-chip button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            font-size: 16px;
        }

        .file-chip button:hover { color: var(--error); }

        /* Loading & Status */
        .loading { display: flex; align-items: center; gap: 12px; color: var(--primary); font-weight: 500; }
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content-area { padding: 20px; }
            .message { max-width: 95%; }
            .input-header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">AI</div>
            <div class="logo-text">AI Studio</div>
        </div>

        <div class="nav-section">
            <div class="nav-title">Create</div>
            <div class="nav-item active" onclick="switchMode('chat')">
                <span>💬</span><span>Chat</span>
            </div>
            <div class="nav-item" onclick="switchMode('image')">
                <span></span><span>Image Generation</span>
            </div>
            <div class="nav-item" onclick="switchMode('video')">
                <span>🎬</span><span>Video Generation</span>
            </div>
        </div>

        <div class="recent-chats">
            <div class="nav-title">Recent</div>
            <div id="chat-list"></div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div class="header-title" id="header-title">New Chat</div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="clearChat()">️ Clear</button>
                <button class="btn btn-primary" onclick="newChat()">+ New Chat</button>
            </div>
        </div>

        <div class="content-area">
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div style="text-align: center; color: var(--text-secondary); padding: 40px;">
                        <div style="font-size: 3rem; margin-bottom: 16px;">🤖</div>
                        <div style="font-size: 1.3rem; font-weight: 600; margin-bottom: 8px;">Welcome to Unified AI Studio</div>
                        <div style="font-size: 0.95rem; margin-bottom: 24px;">Chat • Generate Images • Create Videos</div>
                        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                            <button class="btn btn-secondary" onclick="setMode('chat')">💬 Start Chatting</button>
                            <button class="btn btn-secondary" onclick="setMode('image')">🎨 Create Image</button>
                            <button class="btn btn-secondary" onclick="setMode('video')">🎬 Generate Video</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-header">
                    <div class="mode-selector">
                        <button class="mode-btn active" onclick="setMode('chat')" id="mode-chat">💬 Chat</button>
                        <button class="mode-btn" onclick="setMode('image')" id="mode-image"> Image</button>
                        <button class="mode-btn" onclick="setMode('video')" id="mode-video">🎬 Video</button>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <textarea 
                        class="chat-input" 
                        id="chat-input" 
                        rows="1" 
                        placeholder="Message AI Studio..."
                        onkeydown="handleInput(event)"
                    ></textarea>
                    <button class="attachment-btn" onclick="document.getElementById('file-input').click()">📎</button>
                    <input type="file" id="file-input" style="display: none;" multiple accept="image/*" onchange="handleFileSelect(event)">
                    <button class="send-btn" onclick="sendMessage()" id="send-btn">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
                
                <div class="file-preview" id="file-preview"></div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // API CONFIGURATION - YOUR NGROK URLS
        // ==========================================
        const API_URLS = {
            chat: "https://coroner-relock-wrath.ngrok-free.dev",
            image: "https://concrete-gossip-outpost.ngrok-free.dev",
            video: "https://satin-keep-cupping.ngrok-free.dev"
        };

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let currentMode = 'chat';
        let conversations = JSON.parse(localStorage.getItem('conversations') || '[]');
        let currentConversationId = null;
        let selectedFiles = [];

        // ==========================================
        // MODE SWITCHING
        // ==========================================
        function setMode(mode) {
            currentMode = mode;
            
            // Update mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            
            // Update placeholder
            const input = document.getElementById('chat-input');
            const placeholders = {
                'chat': 'Message AI Studio...',
                'image': 'Describe the image you want to generate...',
                'video': 'Describe the video you want to create...'
            };
            input.placeholder = placeholders[mode];
            
            // Update header
            const titles = {
                'chat': 'Chat',
                'image': 'Image Generation',
                'video': 'Video Generation'
            };
            document.getElementById('header-title').textContent = titles[mode];
        }

        function switchMode(mode) {
            setMode(mode);
            // Also update sidebar
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        // ==========================================
        // FILE HANDLING
        // ==========================================
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            selectedFiles = files.map(file => ({
                file: file,
                preview: URL.createObjectURL(file),
                type: file.type.startsWith('image/') ? 'image' : 'file'
            }));
            renderFilePreview();
        }

        function renderFilePreview() {
            const container = document.getElementById('file-preview');
            if (selectedFiles.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = selectedFiles.map((item, index) => `
                <div class="file-chip">
                    ${item.type === 'image' ? `<img src="${item.preview}" style="width: 32px; height: 32px; object-fit: cover; border-radius: 4px;">` : '📄'}
                    <span>${item.file.name}</span>
                    <button onclick="removeFile(${index})">×</button>
                </div>
            `).join('');
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFilePreview();
        }

        // ==========================================
        // CHAT FUNCTIONALITY
        // ==========================================
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
        function saveConversations() { localStorage.setItem('conversations', JSON.stringify(conversations)); }

        function newChat() {
            const newConv = { id: generateId(), title: 'New Chat', messages: [], createdAt: Date.now() };
            conversations.unshift(newConv);
            saveConversations();
            currentConversationId = newConv.id;
            renderChatList();
            renderMessages();
        }

        function clearChat() {
            if (currentConversationId) {
                const conv = conversations.find(c => c.id === currentConversationId);
                if (conv) { conv.messages = []; saveConversations(); renderMessages(); }
            }
        }

        function loadConversation(convId) {
            currentConversationId = convId;
            renderChatList();
            renderMessages();
        }

        function getCurrentConversation() { return conversations.find(c => c.id === currentConversationId); }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = conversations.map(conv => {
                const isActive = conv.id === currentConversationId ? 'active' : '';
                const preview = conv.messages.length > 0 ? conv.messages[conv.messages.length - 1].content.substring(0, 30) + '...' : 'No messages yet';
                return `<div class="chat-item ${isActive}" onclick="loadConversation('${conv.id}')">${preview}</div>`;
            }).join('');
        }

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            const conv = getCurrentConversation();

            if (!conv || conv.messages.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-secondary); padding: 40px;">
                    <div style="font-size: 3rem; margin-bottom: 16px;">🤖</div>
                    <div style="font-size: 1.3rem; font-weight: 600; margin-bottom: 8px;">Welcome to Unified AI Studio</div>
                    <div style="font-size: 0.95rem;">Start a conversation or generate content</div>
                </div>`;
                return;
            }

            container.innerHTML = conv.messages.map(msg => `
                <div class="message ${msg.role}">
                    <div class="message-avatar">${msg.role === 'user' ? '👤' : '🤖'}</div>
                    <div class="message-content">${formatMessage(msg.content)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(content) {
            return content.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>').replace(/\n/g, '<br>');
        }

        function addMessage(role, content) {
            const conv = getCurrentConversation();
            if (!conv) return;
            conv.messages.push({ role, content, timestamp: Date.now() });
            if (conv.title === 'New Chat' && role === 'user') {
                conv.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
            }
            saveConversations();
            renderMessages();
            renderChatList();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message && selectedFiles.length === 0) return;

            if (!currentConversationId || !getCurrentConversation()) newChat();

            // Build message with files
            let fullMessage = message;
            if (selectedFiles.length > 0) {
                fullMessage = `[${selectedFiles.length} file(s) attached]\n${message}`;
            }

            addMessage('user', fullMessage);
            input.value = '';
            input.style.height = 'auto';
            const filesToSend = [...selectedFiles];
            selectedFiles = [];
            renderFilePreview();

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            const container = document.getElementById('chat-messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content"><div class="loading"><div class="spinner"></div><span>Processing...</span></div></div>`;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;

            try {
                let response, data;

                if (currentMode === 'chat') {
                    // Text-to-Text
                    const conv = getCurrentConversation();
                    const messages = conv.messages.map(m => ({ role: m.role, content: m.content }));
                    
                    const formData = new FormData();
                    formData.append('messages', JSON.stringify(messages));
                    formData.append('max_tokens', '1024');
                    formData.append('temperature', '0.7');

                    response = await fetch(`${API_URLS.chat}/generate_chat`, {
                        method: 'POST',
                        body: formData
                    });
                    data = await response.json();
                } else if (currentMode === 'image') {
                    // Text-to-Image
                    const formData = new FormData();
                    formData.append('prompt', message);
                    formData.append('negative_prompt', '');
                    formData.append('style_preset', 'None');
                    formData.append('enhance_prompt', 'true');
                    formData.append('aspect_ratio', '1:1');
                    formData.append('resolution', '1024');
                    formData.append('steps', '8');
                    formData.append('num_images', '1');
                    formData.append('seed', '-1');
                    formData.append('lora_name', 'None');

                    response = await fetch(`${API_URLS.image}/generate`, {
                        method: 'POST',
                        body: formData
                    });
                    data = await response.json();
                    
                    if (data.result_url) {
                        data.result_text = `Generated image:\n![Image](${API_URLS.image}${data.result_url})`;
                    }
                } else if (currentMode === 'video') {
                    // Text-to-Video
                    const formData = new FormData();
                    formData.append('prompt', message);
                    formData.append('duration', '5 Seconds (121 frames)');
                    formData.append('resolution', '720p');
                    formData.append('aspect_ratio', '16:9 Landscape');
                    formData.append('guide_scale', '3.0');
                    formData.append('steps', '8');
                    formData.append('seed', '-1');
                    formData.append('lora_name', 'None');

                    response = await fetch(`${API_URLS.video}/generate`, {
                        method: 'POST',
                        body: formData
                    });
                    data = await response.json();
                    
                    if (data.result_url) {
                        data.result_text = `Generated video:\n<video controls src="${API_URLS.video}${data.result_url}" style="max-width: 100%; border-radius: 8px;"></video>`;
                    }
                }

                loadingDiv.remove();

                if (data.error) throw new Error(data.error);
                addMessage('assistant', data.result_text || 'Generation complete!');
            } catch (error) {
                loadingDiv.remove();
                addMessage('assistant', `❌ Error: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function handleInput(event) {
            const input = event.target;
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        window.onload = () => {
            if (conversations.length === 0) newChat();
            else currentConversationId = conversations[0].id;
            renderChatList();
            renderMessages();
        };
    </script>
</body>
</html>
