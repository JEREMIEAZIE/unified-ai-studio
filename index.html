<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAINT SILK — AI Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧵</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mobile-header">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('active');">☰</button>
        <div class="mobile-logo">Saint Silk</div>
        <div style="width: 24px;"></div>
    </div>
    <div class="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('open'); this.classList.remove('active');"></div>

    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <img src="assets/logo.png" alt="Logo" onerror="this.style.display='none'">
            <div class="brand-name">Saint Silk</div>
        </div>
        <div class="nav-tree" id="nav-tree"></div>
        <div class="sidebar-footer">
            <button class="btn btn-primary" onclick="window.router.navigate('/chat')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Chat
            </button>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="topbar-title">
                <span class="dot"></span>
                <span id="topbar-title">Loading...</span>
            </div>
        </div>

        <div class="content" id="page-content">
            <div class="page-loading"><div class="spinner"></div></div>
        </div>

        <div class="input-bar">
            <div class="input-wrapper">
                <textarea class="input-box" id="main-input" placeholder="Type a message or describe what to create..." onkeydown="handleInput(event)"></textarea>
                <button class="send-btn" onclick="handleSend()" id="send-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <div class="input-hint" id="input-hint">Press Enter to send • Shift+Enter for new line</div>
        </div>
    </main>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/router.js"></script>
    <script type="module">
        import router from './js/router.js';
        router.init();
    </script>
</body>
</html>
