<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAINT SILK — AI Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧵</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="menu-toggle" onclick="window.router.buildNavigation(); document.getElementById('sidebar').classList.toggle('open');">☰</button>
        <div class="mobile-logo">Saint Silk</div>
        <div style="width: 24px;"></div>
    </div>
    <div class="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('open'); this.classList.remove('active');"></div>

    <!-- Sidebar with Auto-Generated Nav -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <img src="assets/logo.png" alt="Logo" onerror="this.style.display='none'">
            <div class="brand-name">Saint Silk</div>
        </div>
        
        <!-- 🌟 AUTO-GENERATED NAVIGATION -->
        <div class="nav-tree" id="nav-tree"></div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <div class="topbar">
            <div class="topbar-title">
                <span class="dot"></span>
                <span id="topbar-title">Loading...</span>
            </div>
        </div>

        <!-- 🌟 PAGE CONTENT - Dynamically loaded -->
        <div class="content" id="page-content">
            <div class="page-loading"><div class="spinner"></div></div>
        </div>
    </main>

    <!-- Load Core Modules -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/router.js"></script>
    <script type="module">
        import router from './js/router.js';
        router.init();
    </script>
</body>
</html>
