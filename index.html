<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINT SILK — AI Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧵</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #09090b; color: #fafafa; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; background: #0f0f12; border-bottom: 1px solid #2a2a33; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; font-weight: 800; letter-spacing: 0.1em; }
        .tabs { display: flex; gap: 8px; padding: 12px 24px; background: #0f0f12; border-bottom: 1px solid #2a2a33; }
        .tab { padding: 8px 16px; background: #16161a; border: 1px solid #2a2a33; border-radius: 6px; color: #8a8a95; cursor: pointer; font-size: 13px; font-weight: 600; }
        .tab.active { background: #a855f7; color: white; border-color: #a855f7; }
        .content { flex: 1; overflow-y: auto; padding: 24px; }
        .view { display: none; }
        .view.active { display: block; }
        .input-bar { padding: 16px 24px; background: #0f0f12; border-top: 1px solid #2a2a33; }
        .input-wrapper { max-width: 800px; margin: 0 auto; position: relative; }
        textarea { width: 100%; padding: 12px 52px 12px 16px; background: #1e1e24; border: 1px solid #2a2a33; border-radius: 8px; color: #fafafa; font-size: 14px; font-family: inherit; resize: none; min-height: 52px; }
        textarea:focus { outline: none; border-color: #a855f7; }
        button { position: absolute; right: 8px; bottom: 8px; width: 36px; height: 36px; background: #a855f7; border: none; border-radius: 6px; color: white; cursor: pointer; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .result { max-width: 800px; margin: 0 auto; background: #16161a; border: 1px solid #2a2a33; border-radius: 8px; padding: 24px; min-height: 300px; display: flex; align-items: center; justify-content: center; }
        .result img, .result video { max-width: 100%; max-height: 500px; border-radius: 6px; }
        .chat-messages { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .msg { display: flex; gap: 12px; }
        .msg.user { flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; background: #16161a; border: 1px solid #2a2a33; border-radius: 12px; max-width: 70%; }
        .msg.user .bubble { background: #a855f7; border: none; }
        .spinner { width: 20px; height: 20px; border: 2px solid #2a2a33; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>SAINT SILK</h1>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchView('create')">Create</div>
        <div class="tab" onclick="switchView('chat')">Chat</div>
    </div>

    <div class="content">
        <div id="view-create" class="view active">
            <div class="result" id="result-stage">
                <p style="color: #5a5a65;">Your creation will appear here</p>            </div>
        </div>
        
        <div id="view-chat" class="view">
            <div class="chat-messages" id="chat-messages"></div>
        </div>
    </div>

    <div class="input-bar">
        <div class="input-wrapper">
            <textarea id="main-input" placeholder="Describe what you want to create..." onkeydown="handleInput(event)"></textarea>
            <button onclick="handleSend()" id="send-btn">→</button>
        </div>
    </div>

    <script>
        // 🌟 UPDATE THESE URLs WITH YOUR KAGGLE NOTEBOOK URLS
        const API = {
            chat: "https://coroner-relock-wrath.ngrok-free.dev",
            image: "https://concrete-gossip-outpost.ngrok-free.dev",
            video: "https://satin-keep-cupping.ngrok-free.dev"
        };

        let currentView = 'create';
        let messages = [];

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            event.target.classList.add('active');
        }

        function handleInput(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }

        async function handleSend() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            if (currentView === 'chat') {
                messages.push({role: 'user', content: text});                renderMessages();
                
                const btn = document.getElementById('send-btn');
                btn.disabled = true;
                
                messages.push({role: 'assistant', content: '...', loading: true});
                renderMessages();
                
                try {
                    const formData = new FormData();
                    formData.append('messages', JSON.stringify(messages.slice(0, -1)));
                    formData.append('search_web', 'true');
                    
                    const res = await fetch(`${API.chat}/generate_chat`, {method: 'POST', body: formData});
                    const data = await res.json();
                    
                    messages[messages.length - 1] = {role: 'assistant', content: data.result_text || 'No response'};
                    renderMessages();
                } catch (e) {
                    messages[messages.length - 1] = {role: 'assistant', content: `Error: ${e.message}`};
                    renderMessages();
                } finally {
                    btn.disabled = false;
                }
            } else {
                const stage = document.getElementById('result-stage');
                stage.innerHTML = '<div class="spinner"></div>';
                
                try {
                    const formData = new FormData();
                    formData.append('prompt', text);
                    formData.append('resolution', '1024');
                    formData.append('aspect_ratio', '1:1');
                    formData.append('steps', '4');
                    formData.append('num_images', '1');
                    formData.append('seed', '-1');
                    
                    const res = await fetch(`${API.image}/generate`, {method: 'POST', body: formData});
                    const data = await res.json();
                    
                    if (data.result_url) {
                        const fullUrl = `${API.image}${data.result_url}`;
                        stage.innerHTML = `<img src="${fullUrl}" onclick="window.open(this.src)">`;
                    } else {
                        stage.innerHTML = `<p style="color: #ef4444;">Error: ${data.error || 'No result'}</p>`;
                    }
                } catch (e) {
                    stage.innerHTML = `<p style="color: #ef4444;">Error: ${e.message}</p>`;
                }
            }        }

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = messages.map(m => `
                <div class="msg ${m.role}">
                    <div class="bubble">${m.loading ? '<div class="spinner"></div>' : m.content}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
